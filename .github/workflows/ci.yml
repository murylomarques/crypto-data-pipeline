name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate python syntax
        run: |
          python -m py_compile ingestion/coingecko_ingestion.py
          python -m py_compile warehouse/load_raw_to_postgres.py
          python -m py_compile airflow/dags/crypto_market_pipeline.py

      - name: Validate docker compose
        run: docker compose -f docker/docker-compose.yml config

      - name: Validate dbt project parse
        run: dbt parse --project-dir dbt --profiles-dir dbt
