services:
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crypto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_pass}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_dw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../warehouse/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto_user} -d ${POSTGRES_DB:-crypto_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: crypto_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-crypto_user}:${POSTGRES_PASSWORD:-crypto_pass}@postgres:5432/${POSTGRES_DB:-crypto_dw}
      AIRFLOW_UID: "50000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-crypto_dw}
      POSTGRES_USER: ${POSTGRES_USER:-crypto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_pass}
      DATA_LAKE_ROOT: /opt/project/data_lake
      COINGECKO_BASE_URL: ${COINGECKO_BASE_URL:-https://api.coingecko.com/api/v3}
      COINGECKO_VS_CURRENCY: ${COINGECKO_VS_CURRENCY:-usd}
      COINGECKO_PER_PAGE: ${COINGECKO_PER_PAGE:-50}
      COINGECKO_PAGE: ${COINGECKO_PAGE:-1}
      COINGECKO_TIMEOUT_SECONDS: ${COINGECKO_TIMEOUT_SECONDS:-30}
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ..:/opt/project
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local"

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: crypto_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-crypto_user}:${POSTGRES_PASSWORD:-crypto_pass}@postgres:5432/${POSTGRES_DB:-crypto_dw}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-crypto_dw}
      POSTGRES_USER: ${POSTGRES_USER:-crypto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_pass}
      DATA_LAKE_ROOT: /opt/project/data_lake
      COINGECKO_BASE_URL: ${COINGECKO_BASE_URL:-https://api.coingecko.com/api/v3}
      COINGECKO_VS_CURRENCY: ${COINGECKO_VS_CURRENCY:-usd}
      COINGECKO_PER_PAGE: ${COINGECKO_PER_PAGE:-50}
      COINGECKO_PAGE: ${COINGECKO_PAGE:-1}
      COINGECKO_TIMEOUT_SECONDS: ${COINGECKO_TIMEOUT_SECONDS:-30}
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ..:/opt/project
    command: webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: crypto_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-crypto_user}:${POSTGRES_PASSWORD:-crypto_pass}@postgres:5432/${POSTGRES_DB:-crypto_dw}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-crypto_dw}
      POSTGRES_USER: ${POSTGRES_USER:-crypto_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto_pass}
      DATA_LAKE_ROOT: /opt/project/data_lake
      COINGECKO_BASE_URL: ${COINGECKO_BASE_URL:-https://api.coingecko.com/api/v3}
      COINGECKO_VS_CURRENCY: ${COINGECKO_VS_CURRENCY:-usd}
      COINGECKO_PER_PAGE: ${COINGECKO_PER_PAGE:-50}
      COINGECKO_PAGE: ${COINGECKO_PAGE:-1}
      COINGECKO_TIMEOUT_SECONDS: ${COINGECKO_TIMEOUT_SECONDS:-30}
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ..:/opt/project
    command: scheduler

  metabase:
    image: metabase/metabase:v0.50.30
    container_name: crypto_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  metabase_data:
